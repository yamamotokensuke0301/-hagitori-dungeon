<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#151713">
    <title>剥ぎ取りダンジョン Prototype</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="剥ぎ取りダンジョン">
      <section class="topbar" aria-label="ステータス">
        <div>
          <span class="label">階層</span>
          <strong id="floorText">B1F</strong>
        </div>
        <div>
          <span class="label">HP</span>
          <strong><span id="hpText">20</span>/<span id="maxHpText">20</span></strong>
        </div>
        <div>
          <span class="label">攻撃</span>
          <strong id="attackText">4</strong>
        </div>
        <button id="musicButton" class="icon-button" type="button" aria-label="音楽切り替え" title="音楽">♪</button>
      </section>

      <section class="map-wrap" aria-label="ダンジョン">
        <div id="map" class="map" role="grid" aria-label="ダンジョンマップ"></div>
      </section>

      <section class="message-panel" aria-live="polite">
        <p id="messageText">探索を開始します。矢印で移動。</p>
      </section>

      <section class="materials" aria-label="素材">
        <div><span>牙</span><strong id="fangCount">0</strong></div>
        <div><span>皮</span><strong id="hideCount">0</strong></div>
        <div><span>骨</span><strong id="boneCount">0</strong></div>
        <div><span>レア</span><strong id="rareCount">0</strong></div>
        <div><span>超レア</span><strong id="ultraCount">0</strong></div>
      </section>

      <section class="equipment" aria-label="装備">
        <div>
          <span class="label">武器</span>
          <strong id="weaponText">石の短剣</strong>
          <small id="weaponLevelText">Lv.1</small>
        </div>
        <div>
          <span class="label">防具</span>
          <strong id="armorText">裂けた外套</strong>
          <small id="armorLevelText">Lv.1</small>
        </div>
        <div>
          <span class="label">護符</span>
          <strong id="charmText">骨片の護符</strong>
          <small id="charmLevelText">Lv.1</small>
        </div>
      </section>

      <section id="lootPanel" class="loot-panel hidden" aria-label="剥ぎ取り">
        <div>
          <span class="label">剥ぎ取り</span>
          <strong id="lootEnemyText">獣</strong>
        </div>
        <div id="lootChoices" class="loot-choices"></div>
      </section>

      <section class="controls" aria-label="操作">
        <button class="move blank" type="button" tabindex="-1" aria-hidden="true"></button>
        <button class="move" type="button" data-dir="up" aria-label="上へ移動">▲</button>
        <button class="move blank" type="button" tabindex="-1" aria-hidden="true"></button>
        <button class="move" type="button" data-dir="left" aria-label="左へ移動">◀</button>
        <button id="waitButton" class="move wait" type="button" aria-label="待機">●</button>
        <button class="move" type="button" data-dir="right" aria-label="右へ移動">▶</button>
        <button class="move blank" type="button" tabindex="-1" aria-hidden="true"></button>
        <button class="move" type="button" data-dir="down" aria-label="下へ移動">▼</button>
        <button class="move blank" type="button" tabindex="-1" aria-hidden="true"></button>
      </section>

      <section id="endPanel" class="end-panel hidden" aria-label="結果">
        <h1 id="endTitle">結果</h1>
        <p id="endText"></p>
        <button id="restartButton" type="button">もう一度潜る</button>
      </section>
    </main>

    <script src="./game.js?v=4"></script>
  </body>
</html>
